[pytest]
pythonpath = .
DJANGO_SETTINGS_MODULE = django_project.settings
python_files = tests.py test_*.py *_tests.py *_test.py
testpaths =
    core
    django_project
    tests_e2e
addopts =
    -ra
    --strict-markers
    -m "not e2e"
markers =
    unit: Pure logic tests without Django database (domain, use case unit, adapter unit).
    integration: Use case tests with in-memory adapters or adapter-layer wiring tests.
    api: Django/DRF HTTP tests with mocked JWT (django_project app tests).
    e2e: Full-stack tests requiring real Keycloak.
    real_auth: Skip JWT mock so permission checks use real auth service behavior.
